version: 2

seeds:
  - name: store_reference
    description: >
      Reviewed mapping of Glamira store IDs to store domains, countries,
      and ISO currency codes used by the checkout-success sales data.

    columns:
      - name: store_id
        description: Natural store identifier from the Glamira event data.
        data_tests:
          - not_null
          - unique

      - name: store_domain
        description: Website domain associated with the store.
        data_tests:
          - not_null

      - name: store_name
        description: Human-readable name of the storefront.
        data_tests:
          - not_null

      - name: country_code
        description: ISO 3166-1 alpha-2 country code.
        data_tests:
          - not_null

      - name: country_name
        description: Human-readable country name.
        data_tests:
          - not_null

      - name: currency_code
        description: ISO 4217 currency code used by the storefront.
        data_tests:
          - not_null